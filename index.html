<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>小二特製：動漫聖地巡禮地圖</title>
    <!-- 引入 Leaflet 地圖引擎的 CSS 和 JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: '微軟正黑體', sans-serif; }
        /* 標題與搜尋控制列 */
        #controls {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        select { font-size: 16px; padding: 5px; }
        /* 地圖滿版顯示 */
        #map { height: 100vh; width: 100vw; }
        /* 彈出視窗排版 */
        .popup-title { font-weight: bold; color: #e74c3c; font-size: 16px; margin-bottom: 5px;}
        .popup-loc { font-weight: bold; font-size: 14px; margin-bottom: 5px;}
        .popup-desc { font-size: 13px; color: #555; }
    </style>
</head>
<body>

    <!-- 控制面板：用來篩選動漫 -->
    <div id="controls">
        <h3>🎌 動漫聖地巡禮雷達</h3>
        <label for="anime-filter">選擇作品：</label>
        <select id="anime-filter" onchange="filterMap()">
            <option value="all">顯示全部</option>
            <option value="灌籃高手">灌籃高手 (Slam Dunk)</option>
            <option value="排球少年">排球少年!! (Haikyuu!!)</option>
        </select>
    </div>

    <!-- 地圖容器 -->
    <div id="map"></div>

    <script>
        // 1. 建立地圖，中心點預設在日本
        var map = L.map('map').setView([37.5, 138.0], 6);

        // 2. 載入免費的 OpenStreetMap 圖資
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 用一個群組來管理地圖上的圖標
        var markerGroup = L.layerGroup().addTo(map);

        // 3. 核心資料庫 (JSON 格式)
        var holyLands = [
            {
                anime: "灌籃高手",
                location: "鎌倉高校前站 平交道",
                lat: 35.3065,
                lng: 139.5020,
                episode: "TV版 OP (片頭曲)",
                scene: "櫻木花道與晴子在平交道兩端揮手的經典世紀畫面。背後就是波光粼粼的湘南海岸！"
            },
            {
                anime: "排球少年",
                location: "岩手縣立輕米高等學校",
                lat: 40.3283,
                lng: 141.4628,
                episode: "全系列",
                scene: "『烏野高中』的現實原型！不只學校，周邊還有日向和影山練球的河川敷，以及山口忠常去的嶋田超市原型都在這個鎮上。"
            },
            {
                anime: "排球少年",
                location: "仙台市體育館 (Kamei Arena Sendai)",
                lat: 38.2205,
                lng: 140.8752,
                episode: "第一季：宮城縣預選賽",
                scene: "烏野高中參加宮城縣預選賽的超熱血比賽場地，也是對戰青葉城西的經典舞台！"
            }
        ];

        // 4. 根據選擇的作品畫出圖標的函數
        function filterMap() {
            markerGroup.clearLayers();
            var selectedAnime = document.getElementById('anime-filter').value;

            holyLands.forEach(function(site) {
                if (selectedAnime === "all" || site.anime === selectedAnime) {
                    var marker = L.marker([site.lat, site.lng]);
                    var popupContent = `
                        <div class="popup-title">🎬 ${site.anime}</div>
                        <div class="popup-loc">📍 ${site.location}</div>
                        <div class="popup-desc">
                            <b>📺 出現集數：</b>${site.episode}<br><br>
                            <b>📝 場景背景：</b>${site.scene}
                        </div>
                    `;
                    marker.bindPopup(popupContent);
                    markerGroup.addLayer(marker);
                }
            });
        }

        // 網頁載入時先執行一次
        filterMap();

    </script>
</body>
</html>
